name: Bug report
description: Something the skill did wrong, or output that surprised you
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please give enough detail that someone else
        can reproduce what you saw.

  - type: input
    id: invocation
    attributes:
      label: How did you invoke the skill?
      description: The exact prompt or slash command you used.
      placeholder: e.g. "distil my research in ~/Research"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include the skill's response, file changes, or error messages.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Input context
      description: |
        Anything relevant about the research files or folder you ran this on —
        size, formats, structure, anything unusual.
    validations:
      required: false

  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      placeholder: e.g. "Claude Code 1.x"
    validations:
      required: false
